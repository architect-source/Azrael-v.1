<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AZRAEL</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0b" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/azrael-icon/192/192" />
  </head>
  <body>
    <div id="root"></div>  <!-- CRITICAL: This must exist -->
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('AZRAEL // SW_REGISTERED', reg))
            .catch(err => console.error('AZRAEL // SW_REGISTRATION_FAILED', err));
        });
      }
    </script>
  </body>
</html>
