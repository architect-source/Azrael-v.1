steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  # Build the application
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Deploy to Firebase Hosting using Application Default Credentials
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        # Uses the Cloud Build service account's default credentials
        firebase deploy --only hosting --project $PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY


