steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  # Build the application
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Deploy to Firebase Hosting
  # Note: Requires the Firebase builder to be available in your project
  - name: 'gcr.io/cloud-builders/firebase'
    args: ['deploy', '--only', 'hosting']
