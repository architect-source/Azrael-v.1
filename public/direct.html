<!DOCTYPE html>
<html style="background:#000;color:#f00;font-family:monospace;height:100%;margin:0;display:flex;align-items:center;justify-content:center;">
<head>
  <title>AZRAEL // DIRECT_LINK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 20px; width: 100%; max-width: 600px; }
    h2 { border-bottom: 2px solid #f00; padding-bottom: 10px; letter-spacing: 2px; }
    input { 
      width: 100%; 
      background: #000; 
      color: #fff; 
      border: 1px solid #f00; 
      padding: 15px; 
      margin: 20px 0; 
      font-family: inherit;
      outline: none;
    }
    input:focus { box-shadow: 0 0 10px #f00; }
    button { 
      background: #f00; 
      color: #000; 
      border: none; 
      padding: 10px 30px; 
      cursor: pointer; 
      font-weight: bold;
      font-family: inherit;
      width: 100%;
    }
    button:hover { background: #fff; }
    #out { 
      margin-top: 30px; 
      white-space: pre-wrap; 
      line-height: 1.6;
      border-left: 1px solid #300;
      padding-left: 15px;
    }
    .loading { color: #500; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <h2>AZRAEL CORE // DIRECT_LINK</h2>
  <div style="font-size: 10px; color: #500; margin-bottom: 10px;">[ COORDINATES: ABYSS_NORTH // NODE: AZ-01 ]</div>
  <input id="p" placeholder="Issue directive to the Void..." autofocus>
  <button id="btn" onclick="send()">STRIKE</button>
  <div id="out"></div>

  <script>
    const input = document.getElementById('p');
    const output = document.getElementById('out');
    const btn = document.getElementById('btn');

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') send();
    });

    async function send() {
      const prompt = input.value.trim();
      if (!prompt) return;

      input.disabled = true;
      btn.disabled = true;
      output.innerHTML = '<span class="loading">COMMUNICATING_WITH_VOID...</span>';
      
      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ prompt })
        });
        
        if (!r.ok) {
          const err = await r.json();
          throw new Error(err.error || `HTTP_${r.status}`);
        }
        
        const d = await r.json();
        output.innerText = d.text;
        input.value = '';
      } catch (e) {
        output.innerHTML = `<span style="color: #fff; background: #f00; padding: 2px 5px;">ERROR: ${e.message}</span>`;
      } finally {
        input.disabled = false;
        btn.disabled = false;
        input.focus();
      }
    }
  </script>
</body>
</html>
